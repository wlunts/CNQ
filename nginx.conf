# ============================================================
# China Quality Service - Nginx Configuration
# Domain: www.cn-q.com
# Clean URL: /about → serves /about.html (no .html in browser)
# ============================================================

server {
    listen 80;
    server_name cn-q.com www.cn-q.com;
    return 301 https://www.cn-q.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cn-q.com www.cn-q.com;

    # SSL certificates (configure your own paths)
    ssl_certificate     /etc/nginx/ssl/cn-q.com.pem;
    ssl_certificate_key /etc/nginx/ssl/cn-q.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root   /var/www/cn-q.com;
    index  index.html;

    # ----- Clean URL rewrites (strip .html) -----
    # /about → /about.html, /services → /services.html, etc.
    # / → /index.html
    rewrite ^/$ /index.html last;

    # Redirect *.html requests to clean URLs (SEO: avoid duplicate content)
    location ~* ^/(.+)\.html$ {
        # Skip index.html redirect (already handled above)
        if ($1 = "index") {
            return 301 $scheme://www.cn-q.com/;
        }
        return 301 $scheme://www.cn-q.com/$1;
    }

    # Serve clean URLs as their .html counterparts internally
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ----- Security -----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----- Caching -----
    # Static assets with long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    # HTML - no cache (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ----- Gzip -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml text/html;

    # ----- Logging -----
    access_log /var/log/nginx/cn-q.access.log;
    error_log  /var/log/nginx/cn-q.error.log;
}
