<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#123a52"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.04">
    <circle cx="100" cy="100" r="200" fill="#fff"/>
    <circle cx="1100" cy="530" r="250" fill="#fff"/>
    <circle cx="600" cy="315" r="120" fill="#fff"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentBar)"/>

  <!-- Shield/CheckMark icon (quality symbol) -->
  <g transform="translate(600, 195)" text-anchor="middle">
    <!-- Shield shape -->
    <path d="M0,-10 L42,18 L28,42 L-28,42 L-42,18 Z" fill="none" stroke="#e67e22" stroke-width="4" stroke-linejoin="round"/>
    <!-- Checkmark inside shield -->
    <path d="M-14,20 L-4,30 L18,8" fill="none" stroke="#e67e22" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company Name -->
  <text x="600" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">
    China Quality Service
  </text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="1">
    Your Trusted Partner in China
  </text>

  <!-- Divider line -->
  <line x1="480" y1="370" x2="720" y2="370" stroke="#e67e22" stroke-width="2" opacity="0.6"/>

  <!-- Service keywords -->
  <g transform="translate(600, 415)" text-anchor="middle">
    <text font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="3">
      PRODUCT INSPECTION · FACTORY AUDIT · SUPPLIER ASSESSMENT · LAB TESTING
    </text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="582" width="1200" height="48" fill="rgba(0,0,0,0.25)"/>

  <!-- URL -->
  <text x="600" y="614" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.85)" letter-spacing="4">
    www.cn-q.com
  </text>
</svg>
